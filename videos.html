<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сайт для тестирования функционала Adfox</title>
    <link rel="stylesheet" href="style.css">
    
    <!--код загрузчика Adfox-->
    <script>window.yaContextCb = window.yaContextCb || []</script>
    <script src="https://yandex.ru/ads/system/context.js" async></script>
    <!-- Подключаем AdSDK -->
    <script type="text/javascript" charset="utf-8" src="https://yandex.ru/ads/system/adsdk.js"></script>
    
    <style>

        .vslot
        {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        #video {
            width: 100%;
            height: 100%;
        }
    </style>
    
</head>
<body>
    <!-- Шапка сайта (динамическая) -->
    <header class="header">
        <div class="container">
            <h1 class="logo">ADFOX - тестовый сайт</h1>
            <nav class="nav">
                <a href="index.html" class="nav-link">Главная</a>
                <a href="#" class="nav-link">Тестирование таргетингов</a>
                <a href="#" class="nav-link">Тест Header Bidding Adfox</a>
                <a href="test-page.html" class="nav-link">Тестовая страница</a>
            </nav>
        </div>
    </header>

    <!-- Основное содержимое -->
    <main class="content">
        <div class="container">
            <h2>Добро пожаловать!</h2>
            
            <!-- Много контента для прокрутки -->
            <div class="dummy-content">
                
                <div class="block">
                    <div class="content-block" style="display: flex; align-items: center; gap: 5px; max-width: 1200px; margin: 5px auto;">
                      <div class="image-container" style="flex: 1;">

                    <div class="text-content" style="flex: 2;">
                    <h3 style="margin: 5px; color: #333;">Pre-roll • Linear-Ad Pre Roll VAST 3.0</h3>

                        <!-- Контейнер, в котором лежит плеер -->
                        <div class="vslot" id="slot">
                        <video id="video" src="video1.mp4" width="480" height="360" controls="controls"></video>
                        </div>

                        <!-- Скрипт с переменными -->
                        <script>
                            const testAdFoxParameters = {
                                adFoxParameters: {
                                    ownerId: "5202278",
                                    params: {
                                        p1: "dmpgw",
                                        p2: "hiuy",
                                        pfc: "hrdjh",
                                        pfb: "bixtjq",
                                    },
                                },
                            };
                    
                            ya.videoAd.play({
                                videoSlot: document.getElementById('video'),
                                slot: document.getElementById('slot'),
                                config: testAdFoxParameters
                            })
                        </script>
    
                        
                  </div>
                </div>
                </div>

               <div class="text-content" style="flex: 2;">
                    <h3 style="margin: 5px; color: #333;">Pre-roll • Linear-Ad Mid Roll VAST 3.0</h3>

                        <!-- Контейнер, в котором лежит плеер -->
                        <div class="vslot" id="slot1">
                        <video id="video1" src="video1.mp4" width="480" height="360" controls="controls"></video>
                        </div>

                        <!-- Скрипт с переменными -->
                        <script>

                            const testAdFoxParametersMid = {
                                adFoxParameters: {
                                    ownerId: "5202278",
                                    params: {
                                        p1: "dnwkc",
                                        p2: "jsin",
                                        pfc: "hrdjh",
                                        pfb: "biygkx",
                                    },
                                },
                            };

                            
                            ya.videoAd.play({
                                videoSlot: document.getElementById('video1'),
                                slot: document.getElementById('slot1');,
                                config: testAdFoxParametersMid
                            })
                        </script>
    
                        
                  </div>
                </div>
                </div>
              
                
            </div>
        </div>
    </main>

    <!-- Подвал сайта -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Тестовый сайт для Adfox</p>
            <div class="social">
                <a href="https://yandex.ru/support/adfox/ru/" class="social-link">Справка Adfox</a>
                <a href="https://yandex.ru/dev/adfox/doc/ru/" class="social-link">Справка API Adfox</a>
                <a href="#" class="social-link">Test btn</a>
            </div>
        </div>
    </footer>
<script src="script.js"></script>
</body>
</html>
